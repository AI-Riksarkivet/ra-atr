global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Ray Serve metrics (auto-discovered via Ray dashboard)
  - job_name: 'ray'
    http_sd_configs:
      - url: 'http://gpu-server:8265/api/prometheus/sd'
        refresh_interval: 60s

  # Ray metrics direct (fallback if service discovery fails)
  - job_name: 'ray-direct'
    static_configs:
      - targets: ['gpu-server:9100']

  # Lejonet backend metrics (host.docker.internal for dev, backend for compose)
  - job_name: 'lejonet-backend'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: /metrics
