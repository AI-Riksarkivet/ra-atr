name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install deps
        run: npm ci
      - name: Svelte check
        run: npx svelte-kit sync && npx svelte-check --threshold error
      - name: Build
        run: npm run build
