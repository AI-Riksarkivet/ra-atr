name: Publish

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io

jobs:
  publish-gpu-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - dockerfile: gpu-server/Dockerfile.nvidia
            image: ghcr.io/${{ github.repository }}/gpu-server
            tag-suffix: nvidia
          - dockerfile: gpu-server/Dockerfile.rocm
            image: ghcr.io/${{ github.repository }}/gpu-server
            tag-suffix: rocm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}},suffix=-${{ matrix.tag-suffix }}
            type=raw,value=latest-${{ matrix.tag-suffix }}

      - uses: docker/build-push-action@v6
        with:
          context: gpu-server
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
