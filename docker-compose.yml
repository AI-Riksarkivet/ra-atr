services:
  # Backend: catalog search + transcription storage
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - LANCEDB_PATH=/app/data/lancedb
    networks:
      - lejonet

  # GPU inference server (Ray Serve)
  gpu-server:
    build:
      context: ./gpu-server
      dockerfile: Dockerfile.rocm
    ports:
      - "8080:8080"   # API
      - "8265:8265"   # Ray Dashboard
      - "9100:9100"   # Prometheus metrics
    volumes:
      - ./public/models:/models
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    shm_size: 4g
    environment:
      - MODELS_DIR=/models
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
      - RAY_GRAFANA_HOST=http://grafana:3000
      - RAY_PROMETHEUS_HOST=http://prometheus:9090
      - RAY_GRAFANA_IFRAME_HOST=http://localhost:3000
    networks:
      - lejonet

  # Prometheus: metrics collection
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - lejonet

  # Grafana: dashboards and visualization
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    networks:
      - lejonet

volumes:
  prometheus-data:
  grafana-data:

networks:
  lejonet:
    driver: bridge
